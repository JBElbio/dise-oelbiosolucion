<!DOCTYPE html> 
<html> 
<head> 
    <title>Login Frame</title> 
    <style>
        /* The least amount of CSS to center perfectly */
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        /* Optional: Adding a little spacing between inputs */
        input {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            width: 100%;
            padding: 8px;
            cursor: pointer;
        }
    </style>
</head> 
<body> 
    <main>
        <!-- Using placeholder to put text inside the input fields -->
        <input type="text" id="username" name="username" placeholder="Username"> 
        <input type="password" id="password" name="password" placeholder="Password"> 
        <button type="button" id="loginBtn">Login</button> 
    </main>

    <script> 
        document.getElementById('loginBtn').addEventListener('click', function() { 
            const user = document.getElementById('username').value; 
            const pass = document.getElementById('password').value; 

            const loginData = { 
                type: 'LOGIN_ATTEMPT', 
                username: user, 
                password: pass 
            }; 

            window.parent.postMessage(loginData, '*'); 
        }); 
    </script> 
</body> 
</html>
